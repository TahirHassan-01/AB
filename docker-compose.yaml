version: "3.9"

services:
  frontend:
    # Changed: Pointing to the image on Docker Hub instead of building locally
    image: tahirhassan01/frontend-img:latest
    ports:
      - "8080:80"
    restart: always

  backend:
    # Changed: Pointing to the image on Docker Hub instead of building locally
    image: tahirhassan01/backend-img:latest
    ports:
      - "3000:3000"
    environment:
      DB_HOST: db
      DB_USER: postgres
      DB_PASSWORD: example
      DB_NAME: colorsdb
    depends_on:
      - db
    restart: always

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: example
      POSTGRES_DB: colorsdb
    volumes:
      - db-data:/var/lib/postgresql/data
    restart: always

volumes:
  db-data:
